name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap
        run: |
          if [ -x scripts/ci/bootstrap.sh ]; then
            scripts/ci/bootstrap.sh
          else
            echo "skip: scripts/ci/bootstrap.sh not found or not executable"
          fi

      - name: Lint
        run: |
          if [ -x scripts/ci/lint.sh ]; then
            scripts/ci/lint.sh
          else
            echo "skip: scripts/ci/lint.sh not found or not executable"
          fi

      - name: Typecheck
        run: |
          if [ -x scripts/ci/typecheck.sh ]; then
            scripts/ci/typecheck.sh
          else
            echo "skip: scripts/ci/typecheck.sh not found or not executable"
          fi

      - name: Test
        run: |
          if [ -x scripts/ci/test.sh ]; then
            scripts/ci/test.sh
          else
            echo "skip: scripts/ci/test.sh not found or not executable"
          fi

      - name: Build
        run: |
          if [ -x scripts/ci/build.sh ]; then
            scripts/ci/build.sh
          else
            echo "skip: scripts/ci/build.sh not found or not executable"
          fi

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Frontend Vitest + Playwright Smoke
        working-directory: .
        run: |
          if [ -x scripts/ci/test_frontend.sh ]; then
            scripts/ci/test_frontend.sh
          else
            echo "skip: scripts/ci/test_frontend.sh not found or not executable"
          fi
